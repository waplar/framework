name: Advanced Sync with Branch & Release

on:
    push:
        tags: [ 'v*' ]
        branches: [ alpha.x ]

jobs:
    sync:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            id-token: write

        steps:
            -   name: Checkout Code
                uses: actions/checkout@v4
                with:
                    fetch-depth: 0
                    ssh-key: ${{ secrets.DEPLOY_KEY }}

            -   name: Configure Git
                run: |
                    git config --global user.name "Sync Bot"
                    git config --global user.email "bot@waplar.org"
                    mkdir -p ~/.ssh
                    echo -e "Host github.com\n\tStrictHostKeyChecking no\n" >> ~/.ssh/config

            -   name: Sync Code and Release
                env:
                    TARGET_REPO: "waplar-core/preacher"
                    TARGET_DIR: "src/Artist/Preacher"
                    TARGET_BRANCH: ${{ github.ref_name }}
                    TARGET_PAT: ${{ secrets.RELEASE_PAT }}
                run: |
                    # ========== 公共配置 ==========
                    REMOTE_NAME="target-repo"
                    git remote add $REMOTE_NAME "git@github.com:$TARGET_REPO.git"

                    # ========== 分支同步逻辑 ==========
                    if [[ $GITHUB_REF == refs/heads/* ]]; then
                      SOURCE_BRANCH=${GITHUB_REF#refs/heads/}
                      SPLIT_HASH=$(git subtree split --prefix="$TARGET_DIR" --rejoin)
                      git push $REMOTE_NAME "$SPLIT_HASH:refs/heads/$TARGET_BRANCH" --force
                      echo "Branch $SOURCE_BRANCH synced to $TARGET_BRANCH"
                    fi

                    # ========== 标签同步逻辑 ==========
                    if [[ $GITHUB_REF == refs/tags/* ]]; then
                      TAG_NAME=${GITHUB_REF#refs/tags/}
                      IS_PRERELEASE=false
                      [[ $TAG_NAME =~ -(alpha|beta|rc)\.[0-9]+$ ]] && IS_PRERELEASE=true

                      # 分割子树提交
                      TAG_SPLIT_HASH=$(git subtree split --prefix="$TARGET_DIR")
                      git push $REMOTE_NAME "$TAG_SPLIT_HASH:refs/tags/$TAG_NAME" --force

                      # ========== 使用 jq 安全生成 JSON ==========
                      RELEASE_JSON=$(
                        jq -n \
                          --arg tag_name "$TAG_NAME" \
                          --arg body "Synced from ${GITHUB_REPOSITORY}" \
                          --argjson prerelease "$IS_PRERELEASE" \
                          '{
                            tag_name: $tag_name,
                            name: $tag_name,
                            body: $body,
                            prerelease: $prerelease,
                            draft: false
                          }'
                      )

                      # ========== 创建 Release ==========
                      curl -X POST \
                        -H "Authorization: token $TARGET_PAT" \
                        -H "Content-Type: application/json" \
                        "https://api.github.com/repos/$TARGET_REPO/releases" \
                        -d "$RELEASE_JSON"
                    fi
